<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Secondhand Shop</title>
    <link rel="stylesheet" href="css/user-style.css">
</head>
<body>
   <!-- HEADER -->
<header class="main-header">
    <div class="header-container">
        <div class="header-left">
            <a href="index.html" class="logo">
                <span class="logo-icon">🛍️</span>
                <span>Secondhand Shop</span>
            </a>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" class="active">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                </ul>
            </nav>
        </div>
        
        <div class="header-right">
            <a href="cart.html" class="cart-wrapper-minimal">
    <svg class="cart-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span class="cart-badge-minimal" id="cartBadge">0</span>
</a>
            
            <div id="userMenu">
            </div>
        </div>
    </div>
</header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <div class="auth-container">
            <h1 class="auth-title">Đăng nhập</h1>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập <span style="color: red;">*</span></label>
                    <input type="text" 
                           id="username" 
                           placeholder="Nhập tên đăng nhập" 
                           required 
                           autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu <span style="color: red;">*</span></label>
                    <input type="password" 
                           id="password" 
                           placeholder="Nhập mật khẩu" 
                           required 
                           autocomplete="current-password">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">
                        🔐 Đăng nhập
                    </button>
                </div>

                <div class="text-center mt-2">
                    <p>Chưa có tài khoản? <a href="register.html" style="color: var(--primary-color); font-weight: bold;">Đăng ký ngay</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 Secondhand Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Kiểm tra nếu đã đăng nhập thì redirect
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const loginData = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            };

            if (!loginData.username || !loginData.password) {
                showNotification('Vui lòng điền đầy đủ thông tin!', 'error');
                return;
            }

            try {
                const response = await fetchPost(API_ENDPOINTS.LOGIN, loginData);
                
                if (response) {
                    // Lưu thông tin user
                    saveUserData(response);
                    
                    showNotification('Đăng nhập thành công!', 'success');
                    
                    // Chuyển hướng về trang chủ
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showNotification('Tên đăng nhập hoặc mật khẩu không đúng!', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showNotification('Tên đăng nhập hoặc mật khẩu không đúng!', 'error');
            }
        }
    </script>
</body>
</html>
